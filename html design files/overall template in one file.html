<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TenTwenty QA Studio — Product Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --slate-25:#FAFBFC; --slate-50:#F5F6F8; --slate-100:#EBEDF0; --slate-200:#DCE0E5; --slate-300:#C2C8D0;
  --slate-400:#9AA3AF; --slate-500:#6B7684; --slate-600:#4C5563; --slate-700:#333B47; --slate-800:#20252E; --slate-900:#12151B;
  --teal-50:#EAF5F3; --teal-100:#CDE7E2; --teal-500:#0F6B5C; --teal-600:#0C5A4E; --teal-700:#0A4A40;
  --green-100:#DCF3E3; --green-500:#1F8A4C; --green-700:#166238;
  --amber-100:#FBEACB; --amber-500:#B5790A; --amber-700:#8A5B06;
  --red-100:#FBDEDC; --red-500:#C1362A; --red-700:#932A20;
  --blue-100:#DCE9F8; --blue-500:#1E5FA8; --blue-700:#16487F;
  --color-bg-page:var(--slate-50); --color-bg-surface:#fff; --color-bg-surface-secondary:var(--slate-25);
  --color-bg-sidebar:var(--slate-900); --color-bg-hover:var(--slate-100);
  --color-text-primary:var(--slate-900); --color-text-secondary:var(--slate-500);
  --color-text-on-dark:#fff; --color-text-on-dark-secondary:var(--slate-400);
  --color-border-default:var(--slate-200); --color-border-strong:var(--slate-300);
  --color-accent-default:var(--teal-500); --color-accent-hover:var(--teal-600); --color-accent-subtle:var(--teal-50);
  --color-success-default:var(--green-500); --color-success-subtle:var(--green-100); --color-success-subtle-text:var(--green-700);
  --color-warning-default:var(--amber-500); --color-warning-subtle:var(--amber-100); --color-warning-subtle-text:var(--amber-700);
  --color-error-default:var(--red-500); --color-error-subtle:var(--red-100); --color-error-subtle-text:var(--red-700);
  --color-info-default:var(--blue-500); --color-info-subtle:var(--blue-100); --color-info-subtle-text:var(--blue-700);
  --radius-control:6px; --radius-card:8px;
  --shadow-subtle:0 1px 2px rgba(18,21,27,0.05);
}
*{box-sizing:border-box;}
body{margin:0;font-family:'Inter',sans-serif;background:var(--color-bg-page);color:var(--color-text-primary);font-size:14px;line-height:1.45;}
.mono{font-family:'IBM Plex Mono',monospace;font-variant-numeric:tabular-nums;letter-spacing:-0.01em;}
a{text-decoration:none;color:inherit;}

/* Shell */
.app-shell{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:244px;background:var(--color-bg-sidebar);display:flex;flex-direction:column;padding:20px 10px;flex-shrink:0;}
.sidebar-brand{display:flex;align-items:center;gap:8px;padding:6px 12px 22px;}
.sidebar-brand .mark{width:20px;height:20px;border-radius:5px;background:var(--color-accent-default);flex-shrink:0;}
.sidebar-brand .name{font-weight:600;font-size:14px;color:#fff;letter-spacing:-0.01em;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px 9px 14px;border-radius:6px;color:var(--color-text-on-dark-secondary);
  font-size:12.5px;font-weight:500;cursor:pointer;margin-bottom:1px;border-left:2px solid transparent;
  transition:background .12s ease,color .12s ease;user-select:none;}
.nav-item svg{width:15px;height:15px;flex-shrink:0;opacity:.8;}
.nav-item:hover{background:rgba(255,255,255,.05);color:#fff;}
.nav-item.active{background:rgba(15,107,92,.22);color:#fff;border-left:2px solid var(--color-accent-default);}
.nav-item.active svg{opacity:1;}
.nav-spacer{flex:1;}
.nav-lower{border-top:1px solid rgba(255,255,255,.08);margin-top:6px;padding-top:6px;}
.main{flex:1;display:flex;flex-direction:column;min-width:0;}
.header{height:64px;flex-shrink:0;background:#fff;border-bottom:1px solid var(--color-border-default);display:flex;align-items:center;justify-content:space-between;padding:0 28px;}
.header-left{display:flex;align-items:center;gap:12px;}
.page-title{font-size:20px;font-weight:600;letter-spacing:-0.01em;margin:0;}
.pill{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:6px;border:1px solid var(--color-border-default);
  background:var(--color-bg-surface-secondary);font-size:12px;color:var(--color-text-secondary);font-weight:500;}
.pill.warn{border-color:var(--color-warning-default);color:var(--color-warning-subtle-text);background:var(--color-warning-subtle);}
.content{flex:1;overflow-y:auto;padding:24px 28px;display:flex;flex-direction:column;gap:24px;}

/* Buttons */
.btn{border:none;border-radius:6px;font-weight:500;font-size:13px;cursor:pointer;padding:9px 16px;transition:background .12s ease,border-color .12s ease;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:var(--color-accent-default);color:#fff;}
.btn-primary:hover{background:var(--color-accent-hover);}
.btn-secondary{background:var(--color-bg-surface-secondary);color:var(--color-text-primary);border:1px solid var(--color-border-default);}
.btn-secondary:hover{background:var(--color-bg-hover);}
.btn-outline{background:transparent;border:1px solid var(--color-border-strong);}
.btn-text{background:transparent;color:var(--color-accent-default);padding:9px 4px;}
.btn-danger{background:var(--color-error-default);color:#fff;}
.btn[disabled]{opacity:.45;cursor:not-allowed;}

/* Layout helpers */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start;}
.card{background:#fff;border:1px solid var(--color-border-default);border-radius:8px;padding:18px 20px;box-shadow:var(--shadow-subtle);}
.card-title{font-size:13.5px;font-weight:600;margin:0 0 14px;display:flex;align-items:center;justify-content:space-between;}
.card-title a.link{font-size:12px;font-weight:500;color:var(--color-accent-default);}
.card-title a.link:hover{text-decoration:underline;}
.link{color:var(--color-accent-default);cursor:pointer;font-weight:500;}
.link:hover{text-decoration:underline;}
.section-title{font-size:15px;font-weight:600;margin:0 0 4px;}

/* Badges / chips */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:600;letter-spacing:.01em;flex-shrink:0;}
.badge-critical{background:var(--color-error-subtle);color:var(--color-error-subtle-text);}
.badge-high{background:var(--color-warning-subtle);color:var(--color-warning-subtle-text);}
.badge-medium{background:var(--color-info-subtle);color:var(--color-info-subtle-text);}
.badge-low{background:var(--color-bg-surface-secondary);color:var(--color-text-secondary);border:1px solid var(--color-border-default);}
.badge-new{background:var(--color-info-subtle);color:var(--color-info-subtle-text);}
.badge-accepted{background:var(--color-success-subtle);color:var(--color-success-subtle-text);}
.badge-rejected{background:var(--color-bg-surface-secondary);color:var(--color-text-secondary);}
.severity-bar{width:3px;align-self:stretch;border-radius:2px;flex-shrink:0;}
.severity-bar.critical{background:var(--color-error-default);}
.severity-bar.high{background:var(--color-warning-default);}
.severity-bar.medium{background:var(--color-info-default);}
.severity-bar.low{background:var(--color-border-strong);}
.status-chip{padding:3px 9px;border-radius:999px;font-size:11.5px;font-weight:500;}
.status-completed{background:var(--color-success-subtle);color:var(--color-success-subtle-text);}
.status-running{background:var(--color-info-subtle);color:var(--color-info-subtle-text);}
.status-queued{background:var(--color-bg-surface-secondary);color:var(--color-text-secondary);}
.status-failed{background:var(--color-error-subtle);color:var(--color-error-subtle-text);}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--color-info-default);display:inline-block;position:relative;}
.status-dot.live::after{content:'';position:absolute;inset:-4px;border-radius:50%;border:1px solid var(--color-info-default);opacity:.5;animation:pulse-ring 1.8s ease-out infinite;}
@keyframes pulse-ring{0%{transform:scale(.6);opacity:.6;}100%{transform:scale(1.6);opacity:0;}}
@media (prefers-reduced-motion: reduce){.status-dot.live::after{animation:none;}}

/* Stats / progress */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:12px;}
.stat .num{font-size:21px;font-weight:600;display:block;}
.stat .label{font-size:11px;color:var(--color-text-secondary);margin-top:2px;}
.stat.critical .num{color:var(--color-error-default);}
.stat.high .num{color:var(--color-warning-default);}
.progress-track{width:100%;height:6px;background:var(--color-bg-surface-secondary);border-radius:999px;overflow:hidden;}
.progress-fill{height:100%;background:var(--color-accent-default);border-radius:999px;transition:width .4s ease;}
.progress-track.lg{height:10px;}

/* Rows / lists */
.list-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--color-border-default);gap:12px;}
.list-row:last-child{border-bottom:none;padding-bottom:0;}
.quick-action{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:6px;border:1px solid var(--color-border-default);
  background:#fff;font-size:13px;font-weight:500;cursor:pointer;transition:background .12s ease,border-color .12s ease;}
.quick-action:hover{background:var(--color-bg-hover);border-color:var(--color-border-strong);}
.quick-action svg{width:15px;height:15px;color:var(--color-text-secondary);}

/* Tables */
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;font-weight:500;color:var(--color-text-secondary);font-size:11px;text-transform:uppercase;letter-spacing:.04em;
  padding:0 0 10px;border-bottom:1px solid var(--color-border-default);}
td{padding:12px 0;border-bottom:1px solid var(--color-border-default);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr.clickable{cursor:pointer;}
tr:hover td{background:var(--color-bg-surface-secondary);}

/* Forms */
.field{display:flex;flex-direction:column;gap:6px;}
.field label{font-size:12px;font-weight:500;letter-spacing:0.01em;color:var(--color-text-secondary);}
.field input[type=text], .field select, .field textarea{
  border:1px solid var(--color-border-default);border-radius:6px;padding:10px 12px;font-family:inherit;font-size:14px;
  background:#fff;color:var(--color-text-primary);}
.field input:focus, .field select:focus, .field textarea:focus{outline:2px solid var(--color-accent-default);outline-offset:-1px;border-color:var(--color-accent-default);}
.checkbox-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--color-border-default);}
.checkbox-row:last-child{border-bottom:none;}
.checkbox-row input{margin-top:3px;accent-color:var(--color-accent-default);width:16px;height:16px;}
.checkbox-row .cb-title{font-weight:500;font-size:13.5px;}
.checkbox-row .cb-desc{font-size:12px;color:var(--color-text-secondary);margin-top:2px;}

/* Tabs */
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--color-border-default);}
.tab{padding:10px 4px;margin-right:20px;font-size:13px;font-weight:500;color:var(--color-text-secondary);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;}
.tab.active{color:var(--color-text-primary);border-bottom-color:var(--color-accent-default);}

/* Findings split view */
.findings-layout{display:grid;grid-template-columns:380px 1fr;gap:20px;height:100%;flex:1;min-height:0;}
.findings-list{overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding-right:4px;}
.finding-card{display:flex;gap:10px;padding:12px;border-radius:8px;border:1px solid var(--color-border-default);background:#fff;cursor:pointer;}
.finding-card.selected{border-color:var(--color-accent-default);background:var(--color-accent-subtle);}
.finding-card .ftitle{font-weight:500;font-size:13px;margin-bottom:3px;}
.finding-card .fmeta{font-size:11.5px;color:var(--color-text-secondary);}
.detail-section{margin-bottom:18px;}
.detail-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--color-text-secondary);margin-bottom:6px;}
.detail-value{font-size:13.5px;}
.evidence-box{background:var(--slate-900);color:#dfe3e8;border-radius:8px;padding:14px;font-family:'IBM Plex Mono',monospace;font-size:12px;overflow-x:auto;}

/* Empty state */
.empty-state{text-align:center;padding:56px 24px;color:var(--color-text-secondary);}
.empty-state .icon{font-size:28px;margin-bottom:10px;}
.empty-state .title{font-size:14px;font-weight:600;color:var(--color-text-primary);margin-bottom:6px;}

/* Modal / overlay */
.modal-backdrop{position:fixed;inset:0;background:rgba(18,21,27,0.45);display:flex;align-items:center;justify-content:center;z-index:100;}
.modal{background:#fff;border-radius:12px;width:560px;max-width:92vw;max-height:88vh;overflow-y:auto;box-shadow:0 24px 48px rgba(18,21,27,0.24);}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--color-border-default);display:flex;align-items:center;justify-content:space-between;}
.modal-header h2{font-size:16px;font-weight:600;margin:0;}
.modal-close{cursor:pointer;color:var(--color-text-secondary);font-size:18px;line-height:1;background:none;border:none;padding:4px;}
.modal-body{padding:24px;display:flex;flex-direction:column;gap:16px;}
.modal-footer{padding:16px 24px;border-top:1px solid var(--color-border-default);display:flex;justify-content:space-between;align-items:center;}
.step-indicator{display:flex;gap:6px;padding:16px 24px 0;}
.step-dot{flex:1;height:3px;border-radius:999px;background:var(--color-border-default);}
.step-dot.done, .step-dot.active{background:var(--color-accent-default);}

/* Project workspace */
.project-tabs{display:flex;gap:4px;border-bottom:1px solid var(--color-border-default);margin-bottom:4px;}
.project-tab{padding:10px 2px;margin-right:24px;font-size:13px;font-weight:500;color:var(--color-text-secondary);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;user-select:none;}
.project-tab.active{color:var(--color-text-primary);border-bottom-color:var(--color-accent-default);}

/* Knowledge module */
.knowledge-layout{display:grid;grid-template-columns:340px 1fr;gap:20px;align-items:start;}
.source-row{display:flex;align-items:center;gap:10px;padding:12px;border:1px solid var(--color-border-default);border-radius:8px;background:#fff;cursor:pointer;margin-bottom:8px;}
.source-row.selected{border-color:var(--color-accent-default);background:var(--color-accent-subtle);}
.source-icon{width:32px;height:32px;border-radius:6px;background:var(--color-bg-surface-secondary);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--color-text-secondary);}
.source-icon svg{width:16px;height:16px;}
.source-name{font-weight:500;font-size:13px;}
.source-meta{font-size:11px;color:var(--color-text-secondary);margin-top:2px;}
.upload-dropzone{border:1.5px dashed var(--color-border-strong);border-radius:8px;padding:24px;text-align:center;color:var(--color-text-secondary);font-size:12.5px;background:var(--color-bg-surface-secondary);}
.filetype-badge{display:inline-block;padding:2px 8px;border-radius:4px;background:var(--color-bg-surface);border:1px solid var(--color-border-default);font-size:10.5px;color:var(--color-text-secondary);margin:2px;}
.ai-understanding-row{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--color-border-default);}
.ai-understanding-row:last-child{border-bottom:none;}
.ai-understanding-row .k-label{width:130px;flex-shrink:0;font-size:11.5px;font-weight:600;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.03em;padding-top:1px;}

/* Environment cards */
.env-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
.env-card{border:1px solid var(--color-border-default);border-radius:8px;padding:16px;background:#fff;}
.env-card .env-name{font-weight:600;font-size:13.5px;margin-bottom:2px;}
.env-card .env-url{font-size:12px;color:var(--color-text-secondary);font-family:'IBM Plex Mono',monospace;margin-bottom:10px;}
.env-card .env-actions{display:flex;gap:8px;margin-top:12px;}

/* Auth (Login / Sign Up) */
.auth-shell{display:flex;height:100vh;}
.auth-brand{width:42%;background:var(--color-bg-sidebar);color:#fff;display:flex;flex-direction:column;justify-content:space-between;padding:48px;flex-shrink:0;}
.auth-brand .mark-row{display:flex;align-items:center;gap:10px;}
.auth-brand .mark-row .mark{width:24px;height:24px;border-radius:6px;background:var(--color-accent-default);}
.auth-brand .mark-row .name{font-weight:600;font-size:16px;}
.auth-brand h2{font-size:28px;font-weight:600;line-height:1.3;letter-spacing:-0.01em;max-width:380px;margin:0;}
.auth-brand .tagline{color:var(--color-text-on-dark-secondary);font-size:13.5px;margin-top:14px;max-width:340px;}
.auth-brand .quote{font-size:12px;color:var(--color-text-on-dark-secondary);}
.auth-form-panel{flex:1;display:flex;align-items:center;justify-content:center;background:var(--color-bg-page);}
.auth-form{width:360px;display:flex;flex-direction:column;gap:16px;}
.auth-form h1{font-size:20px;font-weight:600;margin:0 0 2px;}
.auth-form .sub{font-size:13px;color:var(--color-text-secondary);margin-bottom:8px;}
.auth-form .switch{text-align:center;font-size:13px;color:var(--color-text-secondary);margin-top:4px;}
.auth-form .divider{display:flex;align-items:center;gap:10px;color:var(--color-text-secondary);font-size:11.5px;margin:2px 0;}
.auth-form .divider::before, .auth-form .divider::after{content:'';flex:1;height:1px;background:var(--color-border-default);}

/* Focus visibility (accessibility + polish) */
button:focus-visible, .nav-item:focus-visible, .quick-action:focus-visible, a:focus-visible,
input:focus-visible, select:focus-visible, textarea:focus-visible, .project-tab:focus-visible, .tab:focus-visible {
  outline: 2px solid var(--color-accent-default); outline-offset: 2px; border-radius: 4px;
}

/* Micro-interactions */
.btn{transition:background .12s ease,border-color .12s ease,transform .08s ease;}
.btn:active{transform:scale(0.97);}
.nav-item{transition:background .15s ease,color .15s ease,border-left-color .15s ease;}
.quick-action{transition:background .12s ease,border-color .12s ease,transform .08s ease;}
.quick-action:active{transform:scale(0.98);}
.card{transition:box-shadow .18s ease,transform .18s ease;}
tr.clickable{transition:background .1s ease;}
.finding-card{transition:border-color .12s ease,background .12s ease,transform .1s ease;}
.finding-card:hover{border-color:var(--color-border-strong);}
.finding-card:active{transform:scale(0.995);}
.source-row{transition:border-color .12s ease,background .12s ease;}
.env-card{transition:box-shadow .18s ease;}
.env-card:hover{box-shadow:var(--shadow-subtle);}

/* Content transition on navigation */
@keyframes content-in { from{opacity:0;transform:translateY(4px);} to{opacity:1;transform:translateY(0);} }
.content-enter{animation:content-in .22s ease both;}

/* Skeleton loading */
.skeleton{background:linear-gradient(100deg, var(--color-bg-surface-secondary) 30%, var(--slate-100) 50%, var(--color-bg-surface-secondary) 70%);
  background-size:200% 100%;animation:skeleton-shimmer 1.3s ease-in-out infinite;border-radius:6px;}
@keyframes skeleton-shimmer{0%{background-position:160% 0;}100%{background-position:-60% 0;}}
.skeleton-block{height:14px;margin-bottom:8px;}
.skeleton-card{background:#fff;border:1px solid var(--color-border-default);border-radius:8px;padding:18px 20px;}
@media (prefers-reduced-motion: reduce){.skeleton{animation:none;background:var(--color-bg-surface-secondary);} .content-enter{animation:none;}}

/* Modal enter/exit animation */
@keyframes modal-in { from{opacity:0;transform:scale(0.97) translateY(6px);} to{opacity:1;transform:scale(1) translateY(0);} }
@keyframes backdrop-in { from{opacity:0;} to{opacity:1;} }
.modal-backdrop{animation:backdrop-in .15s ease both;}
.modal{animation:modal-in .18s cubic-bezier(.2,.8,.3,1) both;}
.modal-backdrop.closing{animation:backdrop-in .12s ease reverse both;}
.modal-backdrop.closing .modal{animation:modal-in .12s ease reverse both;}
@media (prefers-reduced-motion: reduce){.modal-backdrop, .modal{animation:none;}}

/* Toasts */
#toast-root{position:fixed;bottom:24px;right:24px;z-index:400;display:flex;flex-direction:column;gap:8px;align-items:flex-end;}
.toast{display:flex;align-items:center;gap:10px;background:var(--slate-900);color:#fff;padding:12px 16px;border-radius:8px;
  font-size:13px;font-weight:500;box-shadow:var(--shadow-medium);max-width:340px;animation:toast-in .2s cubic-bezier(.2,.8,.3,1) both;}
.toast.success{background:var(--green-700);}
.toast.leaving{animation:toast-out .18s ease both;}
@keyframes toast-in{from{opacity:0;transform:translateY(8px) scale(.98);}to{opacity:1;transform:translateY(0) scale(1);}}
@keyframes toast-out{from{opacity:1;}to{opacity:0;transform:translateX(8px);}}
.toast .dot{width:6px;height:6px;border-radius:50%;background:var(--color-accent-default);flex-shrink:0;}
.toast.success .dot{background:var(--green-100);}

/* Tooltip (data-tooltip attribute) */
[data-tooltip]{position:relative;cursor:help;}
[data-tooltip]::after{
  content:attr(data-tooltip); position:absolute; bottom:calc(100% + 8px); left:50%; transform:translateX(-50%) translateY(2px);
  background:var(--slate-900); color:#fff; font-size:11px; font-weight:500; padding:7px 10px; border-radius:6px;
  white-space:nowrap; opacity:0; pointer-events:none; transition:opacity .12s ease, transform .12s ease; z-index:50;
  box-shadow:var(--shadow-medium);
}
[data-tooltip]::before{
  content:''; position:absolute; bottom:calc(100% + 3px); left:50%; transform:translateX(-50%);
  border:5px solid transparent; border-top-color:var(--slate-900); opacity:0; transition:opacity .12s ease; pointer-events:none;
}
[data-tooltip]:hover::after, [data-tooltip]:hover::before{opacity:1; transform:translateX(-50%) translateY(0);}

/* Header profile + live indicator */
.header-right{display:flex;align-items:center;gap:14px;}
.live-audit-pill{display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:999px;background:var(--color-info-subtle);
  color:var(--color-info-subtle-text);font-size:12px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:border-color .12s ease;}
.live-audit-pill:hover{border-color:var(--color-info-default);}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--color-accent-default);color:#fff;display:flex;align-items:center;
  justify-content:center;font-size:12px;font-weight:600;cursor:pointer;flex-shrink:0;user-select:none;}
.profile-menu{position:relative;}
.profile-dropdown{position:absolute;top:calc(100% + 8px);right:0;background:#fff;border:1px solid var(--color-border-default);
  border-radius:8px;box-shadow:var(--shadow-medium);width:200px;padding:6px;z-index:60;animation:modal-in .12s ease both;}
.profile-dropdown .pd-item{padding:9px 10px;border-radius:6px;font-size:13px;cursor:pointer;transition:background .1s ease;}
.profile-dropdown .pd-item:hover{background:var(--color-bg-hover);}
.profile-dropdown .pd-divider{height:1px;background:var(--color-border-default);margin:6px 0;}
.profile-dropdown .pd-email{font-size:11.5px;color:var(--color-text-secondary);padding:6px 10px 8px;}

/* Bulk action bar (Findings) */
.bulk-bar{display:flex;align-items:center;justify-content:space-between;background:var(--slate-900);color:#fff;padding:10px 14px;
  border-radius:8px;font-size:13px;animation:content-in .15s ease both;}
.bulk-bar .btn-secondary{background:rgba(255,255,255,0.12);color:#fff;border:none;}
.bulk-bar .btn-secondary:hover{background:rgba(255,255,255,0.2);}
.finding-checkbox{margin-top:2px;accent-color:var(--color-accent-default);width:15px;height:15px;flex-shrink:0;}

function toast(message, type){
  const root = document.getElementById('toast-root');
  const el = document.createElement('div');
  el.className = 'toast' + (type === 'success' ? ' success' : '');
  el.innerHTML = `<span class="dot"></span><span>${message}</span>`;
  root.appendChild(el);
  setTimeout(() => {
    el.classList.add('leaving');
    setTimeout(() => el.remove(), 200);
  }, 3200);
}

}

function animateEntrances(){
  document.querySelectorAll('[data-countup]').forEach(el => {
    const target = parseInt(el.getAttribute('data-countup'), 10);
    if (Number.isNaN(target)) return;
    let cur = 0;
    const step = Math.max(1, Math.round(target / 14));
    const timer = setInterval(() => {
      cur = Math.min(target, cur + step);
      el.textContent = cur;
      if (cur >= target) clearInterval(timer);
    }, 16);
  });
  document.querySelectorAll('[data-target-width]').forEach(el => {
    const w = el.getAttribute('data-target-width');
    requestAnimationFrame(() => requestAnimationFrame(() => { el.style.width = w + '%'; }));
  });
}

function renderHeader(){

    return;
  }
  const h = HEADERS[STATE.screen] || {title:''};
  const envClass = h.env === 'Production' ? 'pill warn' : 'pill';
  document.getElementById('header').innerHTML = `
    <div class="header-left">

function showApp(){
  document.querySelector('.app-shell').style.display = 'flex';
  document.getElementById('auth-root').style.display = 'none';
}

function navigate(screen){
  if (screen === 'login' || screen === 'signup') { renderAuth(screen); return; }
  showApp();
  STATE.screen = screen;
  STATE.activeNav = screen;
  renderSidebar();
  renderHeader();
  loadWithSkeleton();
}

function logout(){
  STATE.newAccount = false;
  renderAuth('login');

function openProject(name){

  STATE.screen = 'project';

/* ---------------- CREATE PROJECT MODAL ---------------- */

function openCreateProject(){
  STATE.createProject.open = true;
  STATE.createProject.step = 1;
  renderModal();
}
function closeCreateProject(){
  STATE.createProject.open = false;
  animatedClose('modal-root', renderModal);
}
function saveStepFields(){
  const cp = STATE.createProject;
  if (cp.step === 1) {
    const nameEl = document.getElementById('cp-name');
    const descEl = document.getElementById('cp-desc');
    const clientEl = document.getElementById('cp-client');
    if (nameEl) cp.name = nameEl.value;
    if (descEl) cp.description = descEl.value;
    if (clientEl) cp.client = clientEl.value;
  }
}
function createProjectNext(){
  saveStepFields();
  if (STATE.createProject.step < 4) STATE.createProject.step++;
  renderModal();
}
function createProjectBack(){
  saveStepFields();
  if (STATE.createProject.step > 1) STATE.createProject.step--;
  renderModal();
}
function finishCreateProject(){
  saveStepFields();
  const name = STATE.createProject.name || 'New Project';
  STATE.createProject.open = false;
  renderModal();
  openProject(name);
}

function modalStepBody(){
  const cp = STATE.createProject;
  if (cp.step === 1) {
    return `
      <div class="field"><label>Project Name *</label><input type="text" id="cp-name" value="${cp.name}" placeholder="e.g. Acme Corp Website"></div>
      <div class="field"><label>Description</label><textarea id="cp-desc" rows="2" placeholder="What is this project?">${cp.description}</textarea></div>

        <div class="field"><label>Time Zone</label><select><option>UTC (GMT+0)</option><option>PT (GMT-8)</option></select></div>

  }
  if (cp.step === 2) {
    return `

      ${cp.environments.map(e=>`<div class="list-row"><span style="font-weight:500;">${e}</span><span class="badge badge-accepted">Configured</span></div>`).join('')}

    return `

      </div>
      <div style="font-size:12px;color:var(--color-text-secondary);">Credentials are always stored encrypted.</div>`;
  }
  return `
    <div style="font-size:13px;color:var(--color-text-secondary);margin-bottom:4px;">Review before creating.</div>
    <div class="card" style="background:var(--color-bg-surface-secondary);">
      <div style="display:flex;flex-direction:column;gap:8px;font-size:13px;">
        <div style="display:flex;justify-content:space-between;"><span style="color:var(--color-text-secondary);">Project Name</span><span>${STATE.createProject.name || '(untitled)'}</span></div>
        <div style="display:flex;justify-content:space-between;"><span style="color:var(--color-text-secondary);">Client</span><span>${STATE.createProject.client || '—'}</span></div>
        <div style="display:flex;justify-content:space-between;"><span style="color:var(--color-text-secondary);">Environments</span><span>${STATE.createProject.environments.join(', ')}</span></div>
        <div style="display:flex;justify-content:space-between;"><span style="color:var(--color-text-secondary);">Authentication</span><span>Configured</span></div>
      </div>
    </div>`;
}

function renderModal(){
  const root = document.getElementById('modal-root');
  const cp = STATE.createProject;
  if (!cp.open) { root.innerHTML = ''; return; }
  const stepLabels = ['Basic Information','Environments','Authentication','Finish'];
  root.innerHTML = `
    <div class="modal-backdrop" onclick="if(event.target===this) closeCreateProject()">
      <div class="modal">
        <div class="modal-header"><h2>New Project — ${stepLabels[cp.step-1]}</h2><button class="modal-close" onclick="closeCreateProject()">✕</button></div>
        <div class="step-indicator">${[1,2,3,4].map(n=>`<div class="step-dot ${n<cp.step?'done':n===cp.step?'active':''}"></div>`).join('')}</div>
        <div class="modal-body">${modalStepBody()}</div>
        <div class="modal-footer">
          <button class="btn btn-text" onclick="closeCreateProject()">Cancel</button>
          <div style="display:flex;gap:8px;">
            ${cp.step>1 ? '<button class="btn btn-secondary" onclick="createProjectBack()">Back</button>' : ''}
            ${cp.step<4 ? '<button class="btn btn-primary" onclick="createProjectNext()">Next</button>' : '<button class="btn btn-primary" onclick="finishCreateProject()">Create Project</button>'}
          </div>
        </div>
      </div>
    </div>`;
}

function animatedClose(rootId, afterClear){
  const root = document.getElementById(rootId);
  const backdrop = root.querySelector('.modal-backdrop');
  if (backdrop) { backdrop.classList.add('closing'); setTimeout(() => { if (afterClear) afterClear(); }, 130); }
  else if (afterClear) afterClear();
}

/* ---------------- GENERIC CONFIRMATION DIALOG ---------------- */

function openConfirm({title, message, confirmLabel='Confirm', danger=false, onConfirm}){
  STATE.confirm = { open:true, title, message, confirmLabel, danger, onConfirm };
  renderConfirm();
}
function closeConfirm(){ STATE.confirm.open = false; animatedClose('confirm-root', renderConfirm); }
function confirmAction(){
  const fn = STATE.confirm.onConfirm;
  STATE.confirm.open = false;
  animatedClose('confirm-root', () => { renderConfirm(); if (typeof fn === 'function') fn(); });
}
function renderConfirm(){
  const root = document.getElementById('confirm-root');
  const c = STATE.confirm;
  if (!c || !c.open) { root.innerHTML = ''; return; }
  root.innerHTML = `
    <div class="modal-backdrop" style="z-index:200;" onclick="if(event.target===this) closeConfirm()">
      <div class="modal" style="width:420px;">
        <div class="modal-header"><h2>${c.title}</h2><button class="modal-close" onclick="closeConfirm()">✕</button></div>
        <div class="modal-body"><div style="font-size:13.5px;color:var(--color-text-secondary);line-height:1.5;">${c.message}</div></div>
        <div class="modal-footer" style="justify-content:flex-end;">
          <button class="btn btn-secondary" onclick="closeConfirm()">Cancel</button>
          <button class="btn ${c.danger ? 'btn-danger' : 'btn-primary'}" onclick="confirmAction()">${c.confirmLabel}</button>
        </div>
      </div>
    </div>`;
}

          <div class="field"><label>Environment Name</label><input type="text" id="env-name" placeholder="e.g. UAT"></div>
          <div class="field"><label>Base URL</label><input type="text" id="env-url" placeholder="uat.acmecorp.com"></div>
          <div class="field"><label>Login URL</label><input type="text" placeholder="uat.acmecorp.com/login"></div>
          <div class="grid-2">
            <div class="field"><label>Username</label><input type="text" placeholder="qa-bot@acmecorp.com"></div>
            <div class="field"><label>Password</label><input type="text" placeholder="••••••••"></div>
          </div>
          <div class="field"><label>Notes</label><textarea rows="2" placeholder="Anything the team should know about this environment"></textarea></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-text" onclick="toast('Connection verified.', 'success')">Test Connection</button>
          <div style="display:flex;gap:8px;">
            <button class="btn btn-secondary" onclick="closeEnvModal()">Cancel</button>
            <button class="btn btn-primary" onclick="saveEnv()">Save Environment</button>
          </div>
        </div>
      </div>
    </div>`;
}

/* ---------------- UPLOAD KNOWLEDGE SOURCE MODAL ---------------- */

function openUploadModal(method){ STATE.uploadModal = { open:true, method: method || 'file' }; renderUploadModal(); }
function closeUploadModal(){ STATE.uploadModal.open = false; animatedClose('modal-root', renderUploadModal); }
function setUploadMethod(method){ STATE.uploadModal.method = method; renderUploadModal(); }
function saveUpload(){
  const typeEl = document.getElementById('upload-type');
  const type = typeEl ? typeEl.value : 'Requirements Document';
  const iconMap = { 'Requirements Document':'doc','BRD':'doc','PRD':'doc','Acceptance Criteria':'doc','Test Cases':'checklist','Business Rules':'doc','Content Sheets':'sheet','Figma Design':'figma' };
  const name = STATE.uploadModal.method === 'file' ? (document.getElementById('upload-filename')?.value || 'New_Document.pdf') : 'Pasted Content.txt';
  KNOWLEDGE_SOURCES.push({ name, type, icon: iconMap[type] || 'doc', uploadedBy:'You', date:'Just now', status:'Processing' });
  STATE.selectedSource = KNOWLEDGE_SOURCES.length - 1;
  STATE.uploadModal.open = false;
  renderUploadModal();
  renderContent();
}
function renderUploadModal(){
  const root = document.getElementById('modal-root');
  const um = STATE.uploadModal;
  if (!um.open) { if (!STATE.createProject.open && !STATE.envModal.open) root.innerHTML=''; return; }
  const typeOptions = ['Requirements Document','BRD','PRD','Acceptance Criteria','Test Cases','Business Rules','Content Sheets','Figma Design'];
  root.innerHTML = `
    <div class="modal-backdrop" onclick="if(event.target===this) closeUploadModal()">
      <div class="modal">
        <div class="modal-header"><h2>Add Knowledge Source</h2><button class="modal-close" onclick="closeUploadModal()">✕</button></div>
        <div class="modal-body">
          <div class="field"><label>Source Type</label>
            <select id="upload-type">${typeOptions.map(t=>`<option>${t}</option>`).join('')}</select>
          </div>
          <div class="tabs" style="margin-bottom:2px;">
            <div class="tab ${um.method==='file'?'active':''}" onclick="setUploadMethod('file')">Upload File</div>
            <div class="tab ${um.method==='text'?'active':''}" onclick="setUploadMethod('text')">Paste Text</div>
          </div>
          ${um.method === 'file' ? `
            <div class="upload-dropzone" style="padding:32px;">
              <div style="margin-bottom:10px;">Drag a file here, or</div>
              <input type="text" id="upload-filename" placeholder="Checkout_Test_Cases.xlsx" style="border:1px solid var(--color-border-default);border-radius:6px;padding:9px 12px;font-family:inherit;font-size:13px;width:70%;margin-bottom:10px;">
              <div>${['PDF','DOCX','XLSX','CSV','TXT','Markdown'].map(t=>`<span class="filetype-badge">${t}</span>`).join('')}</div>
            </div>` : `
            <div class="field"><textarea rows="6" placeholder="Paste requirements, test cases, or business rules as plain text..."></textarea></div>
          `}
        </div>
        <div class="modal-footer" style="justify-content:flex-end;">
          <button class="btn btn-secondary" onclick="closeUploadModal()">Cancel</button>
          <button class="btn btn-primary" onclick="saveUpload()">${um.method==='file' ? 'Upload' : 'Add to Knowledge Base'}</button>
        </div>
      </div>
    </div>`;
}

/* ---------------- INVITE USER MODAL ---------------- */

function openInviteModal(){ STATE.inviteModal.open = true; renderInviteModal(); }
function closeInviteModal(){ STATE.inviteModal.open = false; animatedClose('modal-root', renderInviteModal); }
function saveInvite(){
  const name = document.getElementById('invite-name').value || 'New User';
  const email = document.getElementById('invite-email').value || 'new.user@company.com';
  const role = document.getElementById('invite-role').value;
  ADMIN_USERS.push([name, email, role, 'Invited', '—']);
  STATE.inviteModal.open = false;
  renderInviteModal();
  renderContent();
}
function renderInviteModal(){
  const root = document.getElementById('modal-root');
  if (!STATE.inviteModal.open) { if (!STATE.createProject.open && !STATE.envModal.open && !STATE.uploadModal.open) root.innerHTML=''; return; }
  root.innerHTML = `
    <div class="modal-backdrop" onclick="if(event.target===this) closeInviteModal()">
      <div class="modal">
        <div class="modal-header"><h2>Invite User</h2><button class="modal-close" onclick="closeInviteModal()">✕</button></div>
        <div class="modal-body">
          <div class="field"><label>Name</label><input type="text" id="invite-name" placeholder="e.g. Priya Nair"></div>
          <div class="field"><label>Email</label><input type="text" id="invite-email" placeholder="priya@company.com"></div>
          <div class="field"><label>Role</label>
            <select id="invite-role"><option>QA Engineer</option><option>QA Lead</option><option>Administrator</option><option>Viewer</option></select>
          </div>
        </div>
        <div class="modal-footer" style="justify-content:flex-end;">
          <button class="btn btn-secondary" onclick="closeInviteModal()">Cancel</button>
          <button class="btn btn-primary" onclick="saveInvite()">Send Invite</button>
        </div>
      </div>
    </div>`;
}

/* ---------------- CONNECT FIGMA MODAL ---------------- */

function openFigmaModal(){ STATE.figmaModal.open = true; renderFigmaModal(); }
function closeFigmaModal(){ STATE.figmaModal.open = false; animatedClose('modal-root', renderFigmaModal); }
function saveFigma(){
  STATE.figmaModal.open = false;
  renderFigmaModal();
  KNOWLEDGE_SOURCES.push({ name:'Homepage.fig', type:'Figma Design', icon:'figma', uploadedBy:'You', date:'Just now', status:'Processed' });
  openConfirm({ title:'Figma Connected', message:'Your Figma file is connected. It will now be used for Figma Comparison audits and added to this project\u2019s knowledge base.', confirmLabel:'Done', onConfirm:()=>{} });
}
function renderFigmaModal(){
  const root = document.getElementById('modal-root');
  if (!STATE.figmaModal.open) { if (!STATE.createProject.open && !STATE.envModal.open && !STATE.uploadModal.open && !STATE.inviteModal.open) root.innerHTML=''; return; }
  root.innerHTML = `
    <div class="modal-backdrop" onclick="if(event.target===this) closeFigmaModal()">
      <div class="modal">
        <div class="modal-header"><h2>Connect Figma</h2><button class="modal-close" onclick="closeFigmaModal()">✕</button></div>
        <div class="modal-body">
          <div style="font-size:13px;color:var(--color-text-secondary);">Paste a Figma file link to enable Figma Comparison audits against your live pages.</div>
          <div class="field"><label>Figma File URL</label><input type="text" placeholder="https://figma.com/design/..."></div>
        </div>
        <div class="modal-footer" style="justify-content:flex-end;">
          <button class="btn btn-secondary" onclick="closeFigmaModal()">Cancel</button>
          <button class="btn btn-primary" onclick="saveFigma()">Connect</button>
        </div>
      </div>
    </div>`;
}

const SCREENS = {
  dashboard: screenDashboard, projects: screenProjects, project: screenProject, runs: screenHistory, findings: screenFindings,
  reports: screenReports, history: screenHistory, 'run-audit': screenRunAudit, 'live-audit': screenLiveAudit,
  'audit-summary': screenAuditSummary, settings: screenSettings, admin: screenAdmin,
  help: () => `<div class="empty-state"><div class="title">Help Center</div>Documentation coming soon.</div>`,
};

function renderContent(){
  const fn = SCREENS[STATE.screen] || (()=>'');
  const el = document.getElementById('content');
  el.innerHTML = fn();
  el.classList.remove('content-enter');
  void el.offsetWidth;
  el.classList.add('content-enter');
  animateEntrances();
}

renderAuth('login');
</script>
</body>
